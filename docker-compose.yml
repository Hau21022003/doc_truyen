services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    networks:
      - app-network

  backend:
    build: ./backend
    image: lephuchau/nestjs-backend:latest
    container_name: nestjs-backend
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_ENDPOINT: https://lephuchau.io.vn/backend # Build
        NEXT_PUBLIC_URL: https://lephuchau.io.vn
    image: lephuchau/nextjs-frontend:latest
    container_name: nextjs-frontend
    restart: always
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - app-network
  
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network: