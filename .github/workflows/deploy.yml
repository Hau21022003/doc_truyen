name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: lephuchau/doctruyen-backend:latest

      - name: Build & Push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: lephuchau/doctruyen-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_ENDPOINT=https://lephuchau.online/backend
            NEXT_PUBLIC_URL=https://lephuchau.online

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }} # hoặc dùng key
          script: |
            cd /path/to/project
            docker compose pull
            docker compose up -d --remove-orphans
